version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: impact_id_prod
      POSTGRES_USER: impact_user
      POSTGRES_PASSWORD: secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://impact_user:secure_password_here@postgres:5432/impact_id_prod
      - ENVIRONMENT=production
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: